  .page { max-width: 760px; margin: 0 auto; }
  .header { margin-bottom: 32px; }
  .header h1 { font-family: 'Georgia', serif; font-size: 26px; font-weight: normal; letter-spacing: -0.5px; margin-bottom: 6px; }
  .header p { font-size: 14px; color: var(--text-secondary); font-family: sans-serif; }
  .top-actions { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .stats { font-size: 13px; color: var(--text-secondary); font-family: sans-serif; }
  .expand-all { font-size: 12px; font-family: sans-serif; color: var(--text-secondary); cursor: pointer; padding: 5px 12px; border: 1px solid var(--border); border-radius: 20px; background: var(--surface); transition: background 0.15s; }
  .expand-all:hover { background: var(--bg); }
  .phase { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 16px; overflow: hidden; }
  .phase-header { padding: 16px 20px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: background 0.15s; user-select: none; }
  .phase-header:hover { background: var(--bg); }
  .phase-left { display: flex; align-items: center; gap: 12px; }
  .phase-badge { font-size: 11px; font-family: sans-serif; font-weight: 600; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.5px; white-space: nowrap; }
  .phase-info { }
  .phase-title { font-size: 15px; font-weight: normal; font-family: sans-serif; }
  .phase-meta { font-size: 12px; color: var(--text-tertiary); font-family: sans-serif; margin-top: 2px; }
  .chevron { font-size: 11px; color: var(--text-tertiary); transition: transform 0.2s; display: inline-block; }
  .chevron.open { transform: rotate(180deg); }
  .phase-body { display: none; border-top: 1px solid var(--border); }
  .phase-body.open { display: block; }
  .skill { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .skill:last-child { border-bottom: none; }
  .skill-row { display: flex; gap: 12px; }
  .skill-num { font-size: 13px; color: var(--text-tertiary); font-family: sans-serif; min-width: 24px; padding-top: 1px; }
  .skill-content { flex: 1; }
  .skill-name { font-size: 14px; font-family: sans-serif; font-weight: 600; margin-bottom: 8px; }
  .topics { list-style: none; margin-bottom: 12px; }
  .topics li { font-size: 13px; color: var(--text-secondary); font-family: sans-serif; padding: 2px 0; display: flex; gap: 8px; line-height: 1.5; }
  .topics li::before { content: "–"; color: var(--text-tertiary); flex-shrink: 0; }
  .source-label { font-size: 11px; font-family: sans-serif; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
  .sources { display: flex; flex-wrap: wrap; gap: 6px; }
  .source-tag { font-size: 12px; font-family: sans-serif; padding: 4px 10px; border-radius: 20px; border: 1px solid; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; transition: opacity 0.15s; }
  .source-tag:hover { opacity: 0.75; }
  .free-tag { background: #f0faf4; color: #2d7a4f; border-color: #a8dfc0; }
  .paid-tag { background: #f0f5ff; color: #2d4fa8; border-color: #a8bdf0; }

let allOpen = false;
let globalSkillNum = 1;

function toggleAll() {
  allOpen = !allOpen;
  document.querySelectorAll('.phase-body').forEach(b => b.classList.toggle('open', allOpen));
  document.querySelectorAll('.chevron').forEach(c => c.classList.toggle('open', allOpen));
  document.querySelector('.expand-all').textContent = allOpen ? 'Collapse all' : 'Expand all';
}

function togglePhase(id) {
  const body = document.getElementById('body-' + id);
  const chev = document.getElementById('chev-' + id);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

        <span class="skill-num">${num}.</span>
        <div class="skill-content">
          <div class="skill-name">${skill.name}</div>
          <ul class="topics">${skill.topics.map(t => `<li>${t}</li>`).join('')}</ul>
          <div class="source-label">Where to learn</div>
          <div class="sources">${skill.sources.map(s => `<a class="source-tag ${s.label === 'Free' ? 'free-tag' : 'paid-tag'}" href="${s.url}" target="_blank">${s.label === 'Free' ? '🆓' : '💰'} ${s.name}</a>`).join('')}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  return `<div class="phase">
    <div class="phase-header" onclick="togglePhase(${phase.id})">
      <div class="phase-left">
        <span class="phase-badge" style="background:${phase.color};color:${phase.textColor};border:1px solid ${phase.borderColor}">Phase ${phase.id}</span>
        <div class="phase-info">
          <div class="phase-title">${phase.title}</div>
          <div class="phase-meta">${phase.skills.length} skills · ${phase.time}</div>
        </div>
      </div>
      <span class="chevron" id="chev-${phase.id}">▼</span>
    </div>
    <div class="phase-body" id="body-${phase.id}">${skillsHTML}</div>
  </div>`;
}).join('');

// document.getElementById('body-1').classList.add('open');
// document.getElementById('chev-1').classList.add('open');
</script>
</body>
</html>
